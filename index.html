<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYTO Guest WiFi — Star Truck Korea</title>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.28.0/lib/msal-browser.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; background: #f3f2f1; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

  /* ── Login ── */
  #login-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; width:100%; background:linear-gradient(145deg,#0f2744 0%,#0078d4 100%); }
  .login-card { background:#fff; border-radius:20px; padding:52px 48px; text-align:center; box-shadow:0 24px 60px rgba(0,0,0,.22); max-width:400px; width:100%; }
  .login-logo { width:64px; height:64px; background:linear-gradient(135deg,#0078d4,#00bcf2); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.7rem; margin:0 auto 20px; box-shadow:0 8px 20px rgba(0,120,212,.3); }
  .login-title { font-size:1.2rem; font-weight:700; color:#0f2744; margin-bottom:4px; }
  .login-co { font-size:.82rem; color:#94a3b8; margin-bottom:28px; }
  .btn-login { background:linear-gradient(135deg,#0078d4,#005a9e); color:#fff; border:none; border-radius:10px; padding:13px 0; font-size:.92rem; font-weight:600; cursor:pointer; width:100%; font-family:inherit; transition:all .2s; }
  .btn-login:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(0,120,212,.4); }
  .btn-login:disabled { background:#cbd5e0; cursor:not-allowed; transform:none; box-shadow:none; }
  #login-err { color:#e53e3e; font-size:.78rem; margin-top:10px; display:none; }

  /* ── Main ── */
  #main-screen { display:none; width:100%; align-items:center; justify-content:center; min-height:100vh; }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 32px 32px 26px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 2px 12px rgba(0,0,0,.08);
  }
  .card-header { font-size: 11px; color: #94a3b8; margin-bottom: 18px; display:flex; align-items:center; justify-content:space-between; }
  .card-header b { color: #1A2454; font-size: 13px; }
  .ssid-row { display:flex; align-items:center; justify-content:space-between; padding: 10px 14px; background:#f8faff; border-radius:8px; margin-bottom:14px; }
  .ssid-label { font-size: 11px; color: #94a3b8; }
  .ssid-value { font-size: 15px; font-weight: 800; color: #1A2454; letter-spacing: 1px; }
  .pw-box { background: #1A2454; border-radius: 10px; padding: 16px 20px; margin-bottom: 14px; text-align:center; }
  .pw-label { font-size: 10px; color: rgba(255,255,255,.5); margin-bottom: 6px; letter-spacing: .5px; }
  .pw-value { font-size: 28px; font-weight: 800; color: #fff; letter-spacing: 2px; }
  .pw-month { font-size: 11px; color: rgba(255,255,255,.45); margin-top: 5px; }
  .copy-btn { width:100%; padding: 10px; background: #0078d4; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background .2s; margin-bottom: 14px; }
  .copy-btn:hover { background: #106ebe; }
  .copied { background: #16a34a !important; }
  .notice { font-size: 11.5px; color: #78350f; background: #fef9ec; border-left: 3px solid #f59e0b; border-radius: 6px; padding: 9px 12px; line-height: 1.7; margin-bottom: 16px; }
  .footer-row { display:flex; align-items:center; justify-content:space-between; border-top: 1px solid #f1f5f9; padding-top: 14px; }
  .footer-copy { font-size: 10.5px; color: #c4c4c4; }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🛜</div>
    <div class="login-title">NYTO Guest WiFi</div>
    <div class="login-co">Star Truck Korea — Seoul HQ</div>
    <button class="btn-login" id="btn-login" onclick="signIn()" disabled>로딩 중...</button>
    <div style="font-size:.72rem;color:#555;margin-top:20px;text-align:center">© Star Truck Korea · IT Dept.</div>
    <div id="login-err"></div>
  </div>
</div>

<!-- Main -->
<div id="main-screen">
  <div class="card">
    <div class="card-header">
      <span>🛜 Seoul HQ — Guest WiFi</span>
      <b>STAR TRUCK KOREA</b>
    </div>

    <div class="ssid-row">
      <span class="ssid-label">무선네트워크 ID (SSID)</span>
      <span class="ssid-value">NYTO</span>
    </div>

    <div class="pw-box">
      <div class="pw-label">이번 달 패스워드</div>
      <div class="pw-value" id="pw-display">—</div>
      <div class="pw-month" id="month-display">—</div>
    </div>

    <button class="copy-btn" onclick="copyPw()" id="copy-btn">패스워드 복사</button>

    <div class="notice">
      ⚠️ 매월 1일 패스워드가 변경됩니다.<br>
      기존 NYTO 연결을 지운(Forget) 다음, 새 패스워드로 다시 연결해주세요.
    </div>

    <div class="footer-row">
      <span class="footer-copy">stk_it@hyosung.com</span>
      <a href="https://aps.startruckkorea.com/" target="_self" style="text-decoration:none;display:inline-flex;align-items:center;gap:6px;background:#0078d4;color:#fff;border-radius:6px;padding:6px 12px;font-size:.75rem;font-weight:600;font-family:'Segoe UI',sans-serif;" onmouseover="this.style.background='#106ebe'" onmouseout="this.style.background='#0078d4'"><span>📬</span><span>돌아가기</span></a>
    </div>
  </div>
</div>

<script>
const CLIENT_ID = '432976c2-b43a-492e-8213-ece505fa1f51';
const TENANT_ID = '19cab1f5-21f4-44df-8ac6-96d6ca595203';
const MONTHS    = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTH_KO  = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
let msal_g = null;

function getPassword() {
  const now = new Date(new Date().getTime() + 9 * 60 * 60 * 1000);
  const m = now.getUTCMonth(), y = now.getUTCFullYear();
  return { pw: MONTHS[m] + y + '@' + String(m+1).padStart(2,'0'), m, y };
}

async function signIn() {
  try {
    if (window !== window.top) { window.open(window.location.href,'_blank'); return; }
    const r = await msal_g.loginPopup({ scopes: ['User.Read'] });
    msal_g.setActiveAccount(r.account);
    showMain();
  } catch(e) {
    const el = document.getElementById('login-err');
    el.textContent = e.message; el.style.display = 'block';
  }
}

function showMain() {
  document.getElementById('login-screen').style.display = 'none';
  const ms = document.getElementById('main-screen');
  ms.style.display = 'flex';
  const { pw, m, y } = getPassword();
  document.getElementById('pw-display').textContent = pw;
  document.getElementById('month-display').textContent = y + '년 ' + MONTH_KO[m];
}

function copyPw() {
  const pw = document.getElementById('pw-display').textContent;
  const btn = document.getElementById('copy-btn');
  navigator.clipboard.writeText(pw).then(() => {
    btn.textContent = '✅ 복사됨!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '패스워드 복사'; btn.classList.remove('copied'); }, 2000);
  });
}

window.addEventListener('load', async () => {
  const btn = document.getElementById('btn-login');
  const fallback = setTimeout(() => {
    if (btn && btn.disabled) { btn.disabled = false; btn.textContent = 'Hyosung M365 계정으로 로그인'; }
  }, 5000);
  try {
    msal_g = new msal.PublicClientApplication({
      auth: { clientId: CLIENT_ID, authority: 'https://login.microsoftonline.com/' + TENANT_ID, redirectUri: window.location.origin + window.location.pathname },
      cache: { cacheLocation: 'localStorage', storeAuthStateInCookie: false }
    });
    await msal_g.initialize();
    clearTimeout(fallback);
    const resp = await msal_g.handleRedirectPromise();
    if (resp) { msal_g.setActiveAccount(resp.account); showMain(); return; }
    const accounts = msal_g.getAllAccounts();
    if (accounts.length) { msal_g.setActiveAccount(accounts[0]); showMain(); return; }
    if (btn) { btn.disabled = false; btn.textContent = 'Hyosung M365 계정으로 로그인'; }
  } catch(e) {
    clearTimeout(fallback);
    if (btn) { btn.disabled = false; btn.textContent = 'Hyosung M365 계정으로 로그인'; }
    console.warn('MSAL 초기화 오류:', e.message);
  }
});
</script>
</body>
</html>
